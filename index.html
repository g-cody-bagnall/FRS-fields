<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FRS Field Management -- DDPSC</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
:root{
  --dd-blue:#2B6A8A;--dd-blue-light:#E3EFF5;--dd-blue-mid:#4A90B8;
  --green:#3B6D11;--green-light:#EAF3DE;--green-mid:#639922;--green-border:#C0DD97;
  --amber:#BA7517;--amber-light:#FAEEDA;--amber-border:#FAC775;
  --red:#A32D2D;--red-light:#FCEBEB;
  --blue-light:#E6F1FB;--blue:#185FA5;
  --teal-light:#E1F5EE;--teal:#0F6E56;
  --purple-light:#EEEDFE;--purple:#534AB7;
  --gray-light:#F1EFE8;--gray:#5F5E5A;
  --orange-light:#FFF0E5;--orange:#C05A0A;
  --bg:#F7F8FA;--surface:#fff;--border:#E2E5E9;--border-strong:#CBD0D7;
  --text:#1A1A1A;--text-muted:#6B7280;--text-faint:#9CA3AF;
  --r:10px;--rlg:14px;--rsm:6px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0F1117;--surface:#1C1F26;--border:#2E3340;--border-strong:#3D4455;
  --text:#F0F2F5;--text-muted:#9CA3AF;--text-faint:#6B7280;
  --dd-blue-light:#1A2D3A;--green-light:#1A2A10;--amber-light:#2A1F0A;
  --red-light:#2A1010;--blue-light:#0F1E30;--teal-light:#0A1E18;
  --purple-light:#1A1840;--gray-light:#1E2028;--orange-light:#2A1808;
}}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);}
.app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:env(safe-area-inset-bottom,16px);}
.hdr{background:var(--dd-blue);padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.hdr-left{display:flex;align-items:center;gap:10px;}
.logo{width:30px;height:30px;object-fit:contain;filter:brightness(0) invert(1);}
.hdr-title{color:#fff;font-size:14px;font-weight:600;}
.hdr-sub{color:rgba(255,255,255,.65);font-size:11px;margin-top:1px;}
.admin-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:11px;padding:5px 11px;border-radius:20px;cursor:pointer;display:flex;align-items:center;gap:4px;}
.admin-btn.on{background:rgba(255,255,255,.28);border-color:rgba(255,255,255,.55);}
.admin-banner{background:var(--dd-blue-light);border-bottom:1px solid #B5D4F4;padding:.45rem 1rem;display:none;align-items:center;justify-content:space-between;}
.admin-banner.on{display:flex;}
.admin-badge{background:var(--dd-blue);color:#fff;font-size:10px;padding:2px 8px;border-radius:20px;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1rem;gap:1rem;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--dd-blue);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;color:var(--text-muted);}
.error-box{margin:1rem;padding:1rem;background:var(--red-light);border:1px solid #F7C1C1;border-radius:var(--r);font-size:13px;color:var(--red);line-height:1.5;}
.setup-banner{background:var(--dd-blue-light);border:1px solid #B5D4F4;border-radius:var(--r);padding:1rem;margin:1rem;font-size:13px;color:var(--dd-blue);line-height:1.6;}
.setup-banner strong{display:block;font-size:14px;margin-bottom:.5rem;}
.setup-banner code{background:rgba(43,106,138,.12);padding:2px 6px;border-radius:4px;font-size:12px;}
.sel-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:.5rem 1rem;display:flex;gap:8px;align-items:center;}
.sel-bar label{font-size:12px;color:var(--text-muted);white-space:nowrap;}
.sel-bar select{font-size:13px;flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--rsm);padding:5px 8px;color:var(--text);}
.hint{text-align:center;font-size:11px;color:var(--text-faint);padding:.3rem 1rem;background:var(--bg);border-bottom:1px solid var(--border);}
.hint a{color:var(--dd-blue);text-decoration:none;}
.fhdr{background:var(--surface);border-bottom:1px solid var(--border);padding:.875rem 1.125rem .75rem;}
.fhdr-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.5rem;gap:8px;}
.ficon{width:46px;height:46px;border-radius:var(--r);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;border:1px solid;}
.ficon.ann{background:var(--green-light);color:var(--green);border-color:var(--green-border);}
.ficon.per{background:var(--purple-light);color:var(--purple);border-color:#AFA9EC;}
.fname h1{font-size:18px;font-weight:700;color:var(--text);}
.fname .sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
.spill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;border:1px solid;white-space:nowrap;}
.spill.ann{background:var(--green-light);color:var(--green);border-color:var(--green-border);}
.spill.per{background:var(--purple-light);color:var(--purple);border-color:#AFA9EC;}
.fmeta{display:flex;flex-wrap:wrap;gap:.5rem .875rem;padding:.5rem 0 .25rem;border-top:1px solid var(--border);margin-top:.5rem;}
.mi label{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.03em;display:block;}
.mi span{font-size:13px;font-weight:600;color:var(--text);}
.flags{display:flex;gap:6px;flex-wrap:wrap;margin-top:.5rem;}
.flag{font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid;display:inline-flex;align-items:center;gap:4px;}
.flag.w{background:var(--amber-light);color:var(--amber);border-color:var(--amber-border);}
.flag.i{background:var(--blue-light);color:var(--blue);border-color:#B5D4F4;}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:1;min-width:68px;padding:.6rem .25rem;font-size:12px;color:var(--text-muted);background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s;}
.tab.on{color:var(--dd-blue);border-bottom-color:var(--dd-blue-mid);font-weight:600;}
.pane{display:none;padding:.875rem 1rem;}
.pane.on{display:block;}
.prog-wrap{margin-bottom:.875rem;}
.prog-row{display:flex;justify-content:space-between;margin-bottom:5px;}
.prog-row span{font-size:12px;color:var(--text-muted);}
.prog-row .pct{color:var(--green);font-weight:600;}
.prog-track{background:var(--border);border-radius:20px;height:6px;overflow:hidden;}
.prog-fill{height:100%;background:var(--green-mid);border-radius:20px;transition:width .35s;}
.sh{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;margin:1rem 0 .5rem;}
.sh:first-child{margin-top:0;}
.task{display:flex;align-items:flex-start;gap:10px;padding:.65rem .875rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);margin-bottom:7px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.task:active{background:var(--bg);}
.chk{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border-strong);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.task.done .chk{background:var(--green-mid);border-color:var(--green-mid);}
.task.done .chk::after{content:"";width:6px;height:10px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);display:block;}
.task.done .ttl{text-decoration:line-through;color:var(--text-muted);}
.tbody{flex:1;min-width:0;}
.ttl{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;}
.tdet{font-size:12px;color:var(--text-muted);margin-top:3px;line-height:1.4;}
.tmeta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap;}
.tag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;}
.tf{background:var(--amber-light);color:var(--amber);}
.th{background:var(--blue-light);color:var(--blue);}
.tp{background:var(--green-light);color:var(--green);}
.to{background:var(--teal-light);color:var(--teal);}
.ti{background:var(--dd-blue-light);color:var(--dd-blue);}
.tv{background:var(--orange-light);color:var(--orange);}
.cbadge{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--gray-light);color:var(--gray);border:1px solid var(--border);}
.add-panel{background:var(--bg);border:1px solid var(--border);border-radius:var(--rlg);padding:.875rem;margin-bottom:.75rem;display:none;}
.add-panel.on{display:block;}
.add-panel input,.add-panel textarea,.add-panel select{width:100%;margin-bottom:8px;font-size:13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);padding:7px 10px;color:var(--text);}
.add-panel textarea{resize:none;height:58px;}
.btn-row{display:flex;gap:8px;}
.btn-p{background:var(--dd-blue);color:#fff;border:none;padding:7px 16px;border-radius:var(--rsm);font-size:13px;cursor:pointer;font-weight:500;}
.btn-s{background:none;border:1px solid var(--border);padding:7px 14px;border-radius:var(--rsm);font-size:13px;cursor:pointer;color:var(--text-muted);}
.btn-d{background:none;border:none;color:var(--red);cursor:pointer;padding:4px;font-size:14px;}
.add-trig{display:none;width:100%;align-items:center;justify-content:center;gap:8px;padding:.6rem;border:1.5px dashed var(--border-strong);border-radius:var(--rlg);background:none;color:var(--text-muted);font-size:13px;cursor:pointer;margin-top:4px;}
.add-trig.on{display:flex;}
.add-trig:hover{border-color:var(--dd-blue-mid);color:var(--dd-blue);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);margin-bottom:8px;overflow:hidden;}
.card-hd{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;cursor:pointer;gap:8px;}
.card-ttl{font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;}
.card-ttl i{font-size:16px;color:var(--text-muted);}
.chev{font-size:16px;color:var(--text-muted);transition:transform .2s;}
.card.on .chev{transform:rotate(180deg);}
.card-bd{display:none;padding:0 1rem .875rem;border-top:1px solid var(--border);}
.card.on .card-bd{display:block;}
.sgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;padding:.75rem 0 0;}
.sc label{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.03em;display:block;}
.sc span{font-size:13px;font-weight:600;color:var(--text);}
.srow{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.srow:last-child{border-bottom:none;}
.sdate{font-size:11px;color:var(--text-muted);white-space:nowrap;min-width:54px;margin-top:1px;}
.sprod{font-size:12px;color:var(--text);line-height:1.4;}
.note-box{background:var(--amber-light);border:1px solid var(--amber-border);border-radius:var(--r);padding:.75rem;font-size:12px;color:#633806;line-height:1.5;margin-top:.5rem;}
.htbl{width:100%;table-layout:fixed;border-collapse:collapse;font-size:12px;}
.htbl th{font-size:10px;font-weight:600;color:var(--text-muted);text-align:left;padding:.45rem .75rem;border-bottom:1px solid var(--border);background:var(--bg);text-transform:uppercase;letter-spacing:.04em;}
.htbl td{padding:.55rem .75rem;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top;}
.htbl tr:last-child td{border-bottom:none;}
.htbl tr.cur td{background:var(--green-light);color:var(--green);font-weight:600;}
.yb{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;display:inline-block;}
.yb.cur{background:var(--green-light);color:var(--green);}
.yb.old{background:var(--gray-light);color:var(--gray);}
.mrow{display:flex;align-items:center;justify-content:space-between;padding:.6rem .875rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;}
.reset-box{background:var(--red-light);border:1px solid #F7C1C1;border-radius:var(--r);padding:.875rem;margin-top:.75rem;}
.reset-ttl{font-size:13px;font-weight:600;color:var(--red);margin-bottom:.35rem;}
.reset-desc{font-size:12px;color:var(--red);margin-bottom:.625rem;line-height:1.4;}
.btn-danger{background:var(--red);color:#fff;border:none;padding:6px 14px;border-radius:var(--rsm);font-size:12px;cursor:pointer;}
.per-notice{background:var(--purple-light);border:1px solid #AFA9EC;border-radius:var(--r);padding:.75rem;font-size:12px;color:var(--purple);margin-top:.75rem;line-height:1.4;}
.idx-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:.875rem 1rem;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
.idx-card:hover{border-color:var(--dd-blue-mid);}
.idx-l{display:flex;align-items:center;gap:12px;}
.idx-icon{width:42px;height:42px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;border:1px solid;}
.idx-ttl{font-size:14px;font-weight:600;color:var(--text);}
.idx-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
.qr-page{padding:1rem;}
.qr-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.qr-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:.875rem;text-align:center;}
.qr-lbl{font-size:13px;font-weight:700;color:var(--text);}
.qr-sub{font-size:11px;color:var(--text-muted);}
.qr-url{font-size:9px;color:var(--text-faint);word-break:break-all;margin-top:4px;}
.print-btn{display:block;width:100%;padding:10px;background:var(--dd-blue);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:1rem;}
@media print{
  .hdr,.admin-banner,.sel-bar,.hint,.tabs,.print-btn{display:none!important;}
  body,html{background:#fff!important;}
  .app{max-width:100%!important;}
  .qr-page{padding:.5rem!important;}
  .qr-grid{display:grid!important;grid-template-columns:repeat(3,1fr)!important;gap:16px!important;}
  .qr-card{background:#fff!important;border:1px solid #ccc!important;border-radius:8px!important;padding:12px!important;text-align:center!important;page-break-inside:avoid!important;}
  canvas{display:block!important;margin:0 auto 6px!important;}
}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:1rem;}
.modal-bg.on{display:flex;}
.modal{background:var(--surface);border-radius:var(--rlg);padding:1.375rem;width:100%;max-width:340px;}
.modal h2{font-size:16px;font-weight:700;margin-bottom:.5rem;}
.modal p{font-size:13px;color:var(--text-muted);margin-bottom:.75rem;}
.modal input{width:100%;margin-bottom:.625rem;font-size:14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rsm);padding:8px 12px;color:var(--text);}
.modal-err{font-size:12px;color:var(--red);margin-bottom:.5rem;display:none;}

/* SPRAY LOG ENTRY */
.log-form{background:var(--bg);border:1px solid var(--border);border-radius:var(--rlg);padding:.875rem;margin-top:.75rem;}
.log-form input,.log-form select,.log-form textarea{width:100%;margin-bottom:8px;font-size:13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);padding:7px 10px;color:var(--text);}
.log-form textarea{resize:none;height:52px;}
.log-row{display:flex;gap:8px;margin-bottom:8px;}
.log-row input,.log-row select{margin-bottom:0;flex:1;}
.log-entry{display:flex;align-items:flex-start;justify-content:space-between;padding:.6rem .75rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;}
.log-entry-left{}
.log-entry-date{font-size:11px;color:var(--text-faint);margin-bottom:2px;}
.log-entry-product{font-size:13px;font-weight:600;color:var(--text);}
.log-entry-meta{font-size:11px;color:var(--text-muted);margin-top:2px;}

/* REVIEW QUEUE */
.sub-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:.875rem 1rem;margin-bottom:10px;}
.sub-card.pending{border-left:3px solid var(--amber);}
.sub-card.approved{border-left:3px solid var(--green-mid);opacity:.7;}
.sub-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.5rem;}
.sub-title{font-size:14px;font-weight:600;color:var(--text);}
.sub-pi{font-size:12px;color:var(--text-muted);margin-top:2px;}
.sub-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;}
.sub-badge.pending{background:var(--amber-light);color:var(--amber);border:1px solid var(--amber-border);}
.sub-badge.approved{background:var(--green-light);color:var(--green);border:1px solid var(--green-border);}
.sub-detail{font-size:12px;color:var(--text-muted);line-height:1.6;margin-bottom:.75rem;}
.sub-assign{display:flex;gap:8px;align-items:center;}
.sub-assign input{font-size:13px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rsm);padding:6px 10px;color:var(--text);flex:1;}

/* ROLLOVER */
.rollover-preview{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);margin-bottom:8px;overflow:hidden;}
.rollover-head{padding:.65rem .875rem;background:var(--bg);border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.04em;text-transform:uppercase;}
.rollover-row{display:flex;align-items:center;justify-content:space-between;padding:.5rem .875rem;border-bottom:1px solid var(--border);font-size:12px;}
.rollover-row:last-child{border-bottom:none;}
.rollover-fid{font-weight:600;color:var(--text);min-width:40px;}
.rollover-crop{color:var(--text-muted);flex:1;padding:0 .5rem;}
.rollover-badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;}
.rollover-badge.reset{background:var(--green-light);color:var(--green);}
.rollover-badge.keep{background:var(--purple-light);color:var(--purple);}
</style>
</head>
<body>
<div class="app">

<script>
const ADMIN_PW = 'frs2026';
const SHEET_ID = '1LVHRXQ4ESfgCUXvKJ7jaM57LX8dKrMY3JJsxg2i4TjI';
const FIELDS_TAB = 'Fields';
const TASKS_TAB = 'Tasks';
const HISTORY_TAB = 'History';
const APPS_TAB = 'Applications';
const SUBS_TAB = 'Submissions';
const SITE_URL = window.location.origin + window.location.pathname;

let adminMode=false,FIELDS={},TASKS={},HISTORY={},APPS={},SUBS=[],taskState={},customTasks={},loaded=false;
const TAG_LBL={fert:'Fertilizer',herb:'Herbicide',plant:'Planting',obs:'Observation',irrig:'Irrigation',harvest:'Harvest'};
const TAG_CLS={fert:'tf',herb:'th',plant:'tp',obs:'to',irrig:'ti',harvest:'tv'};

function csvUrl(tab){return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tab)}`;}

async function fetchCSV(tab){
  const r=await fetch(csvUrl(tab));
  if(!r.ok)throw new Error(`Failed to fetch tab "${tab}" (${r.status}). Check sheet is public and tab name is exact.`);
  return parseCSV(await r.text());
}

function parseCSV(text){
  const lines=text.trim().split('\n');
  if(lines.length<2)return[];
  const headers=parseCSVLine(lines[0]);
  return lines.slice(1).map(line=>{
    const vals=parseCSVLine(line);
    const obj={};
    headers.forEach((h,i)=>obj[h.trim()]=(vals[i]||'').trim());
    return obj;
  }).filter(r=>Object.values(r).some(v=>v));
}

function parseCSVLine(line){
  const res=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){res.push(cur);cur='';}
    else cur+=c;
  }
  res.push(cur);return res;
}

async function loadData(){
  document.getElementById('root').innerHTML='<div class="loading"><div class="spinner"></div><div class="loading-text">Loading field data from Google Sheets...</div></div>';
  try{
    const[fr,tr,hr,ar,sr]=await Promise.all([fetchCSV(FIELDS_TAB),fetchCSV(TASKS_TAB).catch(()=>[]),fetchCSV(HISTORY_TAB).catch(()=>[]),fetchCSV(APPS_TAB).catch(()=>[]),fetchCSV(SUBS_TAB).catch(()=>[])]);
    FIELDS={};fr.forEach(r=>{if(r.field_id)FIELDS[r.field_id]=r;});
    TASKS={};tr.forEach(r=>{if(!r.field_id)return;if(!TASKS[r.field_id])TASKS[r.field_id]=[];TASKS[r.field_id].push(r);});
    HISTORY={};hr.forEach(r=>{if(!r.field_id)return;if(!HISTORY[r.field_id])HISTORY[r.field_id]=[];HISTORY[r.field_id].push(r);});
    APPS={};ar.forEach(r=>{if(!r.field_id)return;if(!APPS[r.field_id])APPS[r.field_id]=[];APPS[r.field_id].push(r);});
    SUBS=sr;
    loaded=true;
    if(!Object.keys(FIELDS).length){
      document.getElementById('root').innerHTML=`<div class="setup-banner"><strong>Sheet connected -- add your field data</strong>Your Google Sheet is connected but the Fields tab is empty. Add rows following the column structure, then refresh.<br><br><a href="https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit" target="_blank" style="color:var(--dd-blue);font-weight:600">Open Google Sheet to add data &rarr;</a></div>`;
      return;
    }
    render();
  }catch(e){
    document.getElementById('root').innerHTML=`<div class="error-box"><strong>Could not load field data.</strong><br><br>Make sure your Google Sheet is shared as "Anyone with the link can view" and has tabs named exactly: <code>Fields</code>, <code>Tasks</code>, <code>History</code>.<br><br><small>${e.message}</small><br><br><button class="btn-p" onclick="loadData()">Retry</button></div>`;
  }
}

function param(k){return new URLSearchParams(window.location.search).get(k);}
function go(view,fid){
  const u=new URL(window.location.href);
  u.searchParams.set('view',view);
  if(fid)u.searchParams.set('field',fid);else u.searchParams.delete('field');
  window.history.pushState({},'',u);render();
}
window.addEventListener('popstate',render);

function render(){
  if(!loaded){loadData();return;}
  const view=param('view')||'field';
  const root=document.getElementById('root');
  if(view==='index')renderIndex(root);
  else if(view==='qr')renderQR(root);
  else if(view==='review'){if(adminMode)renderReview(root);else{openLogin();go('field',null);}}
  else if(view==='rollover'){if(adminMode)renderRollover(root);else{openLogin();go('field',null);}}
  else{
    const fid=param('field')&&FIELDS[param('field')]?param('field'):Object.keys(FIELDS)[0];
    renderField(root,fid);
  }
}

function renderField(root,fid){
  const f=FIELDS[fid];
  const isP=f.perennial==='TRUE';
  const opts=Object.keys(FIELDS).sort().map(id=>`<option value="${id}"${id===fid?' selected':''}>${id} -- ${FIELDS[id].crop.split(',')[0]} (${FIELDS[id].lab})</option>`).join('');
  root.innerHTML=`
    <div class="sel-bar"><label>Field:</label><select onchange="go('field',this.value)">${opts}</select></div>
    <div class="hint"><i class="ti ti-qrcode"></i> QR links to this field &nbsp;&middot;&nbsp; <a href="?view=index" onclick="event.preventDefault();go('index')">All fields</a> &nbsp;&middot;&nbsp; <a href="?view=qr" onclick="event.preventDefault();go('qr')">Print QR</a> &nbsp;&middot;&nbsp; <span id="adminLinks" style="display:none"><a href="?view=review" onclick="event.preventDefault();go('review')" style="color:var(--amber)">Review queue</a> &nbsp;&middot;&nbsp; <a href="?view=rollover" onclick="event.preventDefault();go('rollover')" style="color:var(--red)">Season rollover</a></span></div>
    <div id="fhdr"></div>
    <div class="tabs" id="tabBar"></div>
    <div id="pane-tasks" class="pane"></div>
    <div id="pane-details" class="pane"></div>
    <div id="pane-history" class="pane"></div>
    <div id="pane-log" class="pane"></div>
    <div id="pane-manage" class="pane"></div>`;
  buildHdr(f,isP);buildTabBar('tasks');buildTasks(fid,isP);buildDetails(f);buildHistory(fid,f);buildLog(fid);
  if(adminMode)buildManage(fid,f,isP);
}

function buildHdr(f,isP){
  const ic=isP?'per':'ann';
  const dims=(f.width_ft&&f.length_ft)?`${f.width_ft}ft x ${f.length_ft}ft`:'See notes';
  const flags=f.restrictions?f.restrictions.split(';').filter(Boolean).map(r=>`<span class="flag w"><i class="ti ti-alert-triangle" style="font-size:11px"></i>${r.trim()}</span>`).join(''):'';
  document.getElementById('fhdr').innerHTML=`<div class="fhdr">
    <div class="fhdr-row">
      <div style="display:flex;align-items:center;gap:10px;min-width:0">
        <div class="ficon ${ic}">${f.field_id}</div>
        <div class="fname"><h1>${f.section} Field ${f.field_id}</h1><div class="sub">${f.pi} . ${f.crop.split(',')[0]}</div></div>
      </div>
      <span class="spill ${ic}">${isP?'Perennial':f.year}</span>
    </div>
    <div class="fmeta">
      <div class="mi"><label>Acreage</label><span>${f.acreage} ac</span></div>
      <div class="mi"><label>Dimensions</label><span>${dims}</span></div>
      <div class="mi"><label>Tillage</label><span>${f.tillage==='TRUE'?'Yes':'No'}</span></div>
      ${f.project_code?`<div class="mi"><label>Project</label><span style="font-size:11px">${f.project_code.split(';')[0].trim()}</span></div>`:''}
    </div>
    ${flags?`<div class="flags">${flags}</div>`:''}
  </div>`;
}

function buildTabBar(active){
  const tabs=[{id:'tasks',icon:'ti-checkbox',lbl:'Tasks'},{id:'details',icon:'ti-file-description',lbl:'Details'},{id:'history',icon:'ti-history',lbl:'History'},...(adminMode?[{id:'manage',icon:'ti-settings',lbl:'Manage'}]:[])];
  document.getElementById('tabBar').innerHTML=tabs.map(t=>`<button class="tab${t.id===active?' on':''}" onclick="switchTab('${t.id}')"><i class="ti ${t.icon}"></i> ${t.lbl}</button>`).join('');
  document.getElementById('pane-'+active).classList.add('on');
}

function switchTab(id){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  document.querySelector(`.tab[onclick*="'${id}'"]`).classList.add('on');
  document.getElementById('pane-'+id).classList.add('on');
}

function buildTasks(fid,isP){
  const st=taskState[fid]||(taskState[fid]={});
  const ct=customTasks[fid]||(customTasks[fid]=[]);
  const base=(TASKS[fid]||[]).map((t,i)=>({...t,idx:i,isCustom:false,isDone:st['t'+i]||false}));
  const custom=ct.map((t,i)=>({...t,idx:i,isCustom:true,isDone:st['c'+i]||false}));
  const all=[...base,...custom];
  const done=all.filter(t=>t.isDone).length;
  const pct=all.length?Math.round(done/all.length*100):0;
  const tHTML=items=>items.map(t=>`
    <div class="task${t.isDone?' done':''}" onclick="toggleTask('${fid}',${t.idx},${t.isCustom})" role="checkbox" aria-checked="${t.isDone}" tabindex="0">
      <div class="chk"></div>
      <div class="tbody">
        <div class="ttl">${t.title}</div>
        ${t.detail?`<div class="tdet">${t.detail}</div>`:''}
        <div class="tmeta"><span class="tag ${TAG_CLS[t.tag]||'to'}">${TAG_LBL[t.tag]||'Observation'}</span>${t.isCustom?'<span class="cbadge">added</span>':''}</div>
      </div>
    </div>`).join('');
  const addHTML=adminMode?`
    <div class="add-panel" id="ap-${fid}">
      <input type="text" id="nt-t-${fid}" placeholder="Task name (required)">
      <textarea id="nt-d-${fid}" placeholder="Details / specs (optional)"></textarea>
      <select id="nt-tag-${fid}"><option value="plant">Planting</option><option value="fert">Fertilizer</option><option value="herb">Herbicide</option><option value="irrig">Irrigation</option><option value="harvest">Harvest</option><option value="obs">Observation</option></select>
      <div class="btn-row"><button class="btn-s" onclick="hideAP('${fid}')">Cancel</button><button class="btn-p" onclick="saveTask('${fid}')">Add task</button></div>
    </div>
    <button class="add-trig on" onclick="showAP('${fid}')"><i class="ti ti-plus"></i> Add task for this field</button>`:'';
  document.getElementById('pane-tasks').innerHTML=`
    <div class="prog-wrap"><div class="prog-row"><span>${done} of ${all.length} complete</span><span class="pct">${pct}%</span></div><div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div></div>
    ${all.length===0?'<p style="font-size:13px;color:var(--text-muted)">No tasks defined for this field yet.</p>':tHTML(base)}
    ${custom.length?`<p class="sh" style="margin-top:.75rem">Added this season</p>${tHTML(custom)}`:''}
    ${addHTML}`;
}

function toggleTask(fid,idx,isCustom){
  const st=taskState[fid]||(taskState[fid]={});
  const k=(isCustom?'c':'t')+idx;st[k]=!st[k];
  buildTasks(fid,FIELDS[fid].perennial==='TRUE');
}
function showAP(fid){document.getElementById('ap-'+fid).classList.add('on');}
function hideAP(fid){document.getElementById('ap-'+fid).classList.remove('on');}
function saveTask(fid){
  const t=document.getElementById('nt-t-'+fid).value.trim();if(!t)return;
  const d=document.getElementById('nt-d-'+fid).value.trim();
  const tag=document.getElementById('nt-tag-'+fid).value;
  (customTasks[fid]||(customTasks[fid]=[])).push({title:t,detail:d,tag});
  hideAP(fid);buildTasks(fid,FIELDS[fid].perennial==='TRUE');
}

function buildLog(fid){
  var apps=APPS[fid]||[];
  var entries=apps.map(function(a,i){
    return '<div class="log-entry">'
      +'<div class="log-entry-left">'
      +'<div class="log-entry-date">'+a.date+' &nbsp;<span class="tag '+(a.type==='herb'?'th':a.type==='fert'?'tf':a.type==='irrig'?'ti':'to')+'" style="font-size:10px">'+(a.type||'obs')+'</span></div>'
      +'<div class="log-entry-product">'+a.product+'</div>'
      +'<div class="log-entry-meta">'+(a.rate?a.rate+' &nbsp;&middot;&nbsp; ':'')+''+(a.applicator||'')+(a.weather?' &nbsp;&middot;&nbsp; '+a.weather:'')+'</div>'
      +(a.notes?'<div class="log-entry-meta" style="font-style:italic">'+a.notes+'</div>':'')
      +'</div></div>';
  }).join('');

  var formHTML='<div class="log-form">'
    +'<p style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px">Log new application</p>'
    +'<div class="log-row">'
    +'<input type="date" id="lg-date-'+fid+'" placeholder="Date">'
    +'<select id="lg-type-'+fid+'">'
    +'<option value="herb">Herbicide</option>'
    +'<option value="fert">Fertilizer</option>'
    +'<option value="irrig">Irrigation</option>'
    +'<option value="harvest">Harvest</option>'
    +'<option value="obs">Other</option>'
    +'</select></div>'
    +'<input type="text" id="lg-prod-'+fid+'" placeholder="Product name">'
    +'<input type="text" id="lg-rate-'+fid+'" placeholder="Rate (e.g. 2 qt/ac)">'
    +'<div class="log-row">'
    +'<input type="text" id="lg-app-'+fid+'" placeholder="Applicator name">'
    +'<input type="text" id="lg-wx-'+fid+'" placeholder="Weather conditions">'
    +'</div>'
    +'<textarea id="lg-notes-'+fid+'" placeholder="Notes (optional)"></textarea>'
    +'<div class="btn-row">'
    +'<button class="btn-p" onclick="saveLog(''+fid+'')"><i class="ti ti-plus"></i> Save entry</button>'
    +'</div></div>';

  document.getElementById('pane-log').innerHTML=
    '<p class="sh">Application log -- '+fid+'</p>'
    +(apps.length===0?'<p style="font-size:13px;color:var(--text-muted);margin-bottom:.75rem">No applications logged yet.</p>':entries)
    +'<p class="sh" style="margin-top:1rem">Add entry</p>'
    +formHTML
    +'<p style="font-size:11px;color:var(--text-faint);margin-top:.75rem">Entries saved here are for reference only. To permanently record in the Sheet, copy to the Applications tab.</p>';

  // Set today as default date
  var today=new Date().toISOString().split('T')[0];
  var dateEl=document.getElementById('lg-date-'+fid);
  if(dateEl)dateEl.value=today;
}

function saveLog(fid){
  var date=document.getElementById('lg-date-'+fid).value;
  var type=document.getElementById('lg-type-'+fid).value;
  var product=document.getElementById('lg-prod-'+fid).value.trim();
  var rate=document.getElementById('lg-rate-'+fid).value.trim();
  var applicator=document.getElementById('lg-app-'+fid).value.trim();
  var weather=document.getElementById('lg-wx-'+fid).value.trim();
  var notes=document.getElementById('lg-notes-'+fid).value.trim();
  if(!date||!product){alert('Date and product are required.');return;}
  if(!APPS[fid])APPS[fid]=[];
  APPS[fid].unshift({field_id:fid,date:date,type:type,product:product,rate:rate,applicator:applicator,weather:weather,notes:notes});
  buildLog(fid);
  // Show copy reminder
  alert('Entry saved for this session.\n\nTo make it permanent, add this row to the Applications tab in your Google Sheet:\n\n'+fid+' | '+date+' | '+product+' | '+rate+' | '+type+' | '+applicator+' | '+weather+' | '+notes);
}

      ${f.n_gal_total?`<div class="sc"><label>Total gal/field</label><span>${f.n_gal_total}</span></div>`:''}

  const obsSec=`<div class="card" id="dc-obs">

    <div class="card-bd"><div class="sgrid">
      <div class="sc"><label>UAV imaging</label><span>${f.imaging||'N'}</span></div>
      <div class="sc"><label>Giddings probe</label><span>${f.giddings||'N'}</span></div>
      <div class="sc"><label>Mini-Rhizo</label><span>${f.mini_rhizo||'N'}</span></div>
      <div class="sc"><label>Project length</label><span>${f.project_length||'--'}</span></div>
      ${f.planting_date?`<div class="sc"><label>Plant date</label><span>${f.planting_date}</span></div>`:''}
    </div></div></div>`;
  document.getElementById('pane-details').innerHTML=`<p class="sh">${f.year} season -- ${f.crop}</p>${plotSec}${nSec}${obsSec}${f.notes?`<div class="note-box"><strong>Notes:</strong> ${f.notes}</div>`:''}`;

function toggleCard(id){document.getElementById(id).classList.toggle('on');}

function buildHistory(fid,f){
  const hist=[...( HISTORY[fid]||[])];
  if(!hist.find(h=>String(h.year)===String(f.year)))hist.push({field_id:fid,year:f.year,lab:f.lab,crop:f.crop});
  hist.sort((a,b)=>a.year-b.year);
  const rows=hist.map(h=>{const cur=String(h.year)===String(f.year);return`<tr${cur?' class="cur"':''}><td><span class="yb ${cur?'cur':'old'}">${h.year}</span></td><td>${h.lab}</td><td>${h.crop}</td></tr>`;}).join('');
  const st=taskState[fid]||{};
  const arch=(TASKS[fid]||[]).filter((_,i)=>st['t'+i]);
  document.getElementById('pane-history').innerHTML=`
    <p class="sh">Crop rotation</p>
    <div class="card"><div class="card-bd" style="display:block;padding:0"><table class="htbl"><thead><tr><th>Year</th><th>Lab / PI</th><th>Crop</th></tr></thead><tbody>${rows}</tbody></table></div></div>
    ${f.perennial==='TRUE'?'<div style="margin-top:.5rem"><span class="flag i"><i class="ti ti-leaf" style="font-size:11px"></i>Perennial -- no seasonal reset</span></div>':''}
    ${arch.length?`<p class="sh" style="margin-top:1rem">Completed tasks this season</p><div class="card"><div class="card-bd" style="display:block;padding:.5rem .75rem">${arch.map(t=>`<div style="padding:.4rem 0;font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)"><i class="ti ti-check" style="color:var(--green-mid)"></i>${t.title}</div>`).join('')}</div></div>`:''}
    <p style="font-size:11px;color:var(--text-faint);margin-top:.75rem">Add past seasons to the History tab in your Google Sheet to build the rotation record.</p>`;
}

  document.getElementById('pane-manage').innerHTML=`
    <p class="sh">Field ${fid} -- season management</p>
    <div class="card" id="dc-mgmt">
      <div class="card-hd" onclick="toggleCard('dc-mgmt')"><div class="card-ttl"><i class="ti ti-calendar-event"></i>Season status</div><i class="ti ti-chevron-down chev"></i></div>
      <div class="card-bd"><div class="sgrid" style="padding-top:.625rem">
        <div class="sc"><label>Type</label><span>${isP?'Perennial':'Annual'}</span></div>
        <div class="sc"><label>Season</label><span>${f.year}</span></div>
        <div class="sc"><label>Crop</label><span>${f.crop.split(',')[0]}</span></div>

      </div>
      ${!isP?`<div class="reset-box"><div class="reset-ttl"><i class="ti ti-refresh" style="font-size:13px"></i> Season reset</div><div class="reset-desc">Archives completed tasks to History and clears the checklist for the new season.</div><button class="btn-danger" onclick="resetSeason('${fid}')">Reset season for ${fid}</button></div>`:`<div class="per-notice"><i class="ti ti-leaf"></i> Perennial -- tasks roll forward until project end.</div>`}
      </div>
    </div>

      <i class="ti ti-table" style="font-size:16px"></i> Open Google Sheet to edit field data <i class="ti ti-external-link" style="margin-left:auto;font-size:14px;color:var(--text-faint)"></i></a>
    <a href="?view=review" onclick="event.preventDefault();go('review')" style="display:flex;align-items:center;gap:8px;padding:.75rem 1rem;background:var(--amber-light);border:1px solid var(--amber-border);border-radius:var(--r);font-size:13px;color:var(--amber);text-decoration:none;font-weight:500;margin-bottom:8px">
      <i class="ti ti-clipboard-list" style="font-size:16px"></i> PI submission review queue <i class="ti ti-chevron-right" style="margin-left:auto;font-size:14px"></i></a>
    <a href="?view=rollover" onclick="event.preventDefault();go('rollover')" style="display:flex;align-items:center;gap:8px;padding:.75rem 1rem;background:var(--red-light);border:1px solid #F7C1C1;border-radius:var(--r);font-size:13px;color:var(--red);text-decoration:none;font-weight:500">
      <i class="ti ti-refresh" style="font-size:16px"></i> Season rollover tool <i class="ti ti-chevron-right" style="margin-left:auto;font-size:14px"></i></a>\`;
}

function removeTask(fid,idx){
  customTasks[fid].splice(idx,1);
  const st=taskState[fid]||{};const ns={};
  Object.keys(st).forEach(k=>{if(!k.startsWith('c')){ns[k]=st[k];return;}const i=parseInt(k.slice(1));if(i<idx)ns[k]=st[k];else if(i>idx)ns['c'+(i-1)]=st[k];});
  taskState[fid]=ns;buildTasks(fid,FIELDS[fid].perennial==='TRUE');buildManage(fid,FIELDS[fid],FIELDS[fid].perennial==='TRUE');
}

function resetSeason(fid){
  if(!confirm(`Reset season for field ${fid}?\n\nCompleted tasks archived. Checklist and custom tasks cleared.`))return;
  taskState[fid]={};customTasks[fid]=[];
  alert(`Field ${fid} reset complete.`);
  const f=FIELDS[fid];buildTasks(fid,f.perennial==='TRUE');buildHistory(fid,f);buildManage(fid,f,f.perennial==='TRUE');
}

function renderReview(root){
  var pending=SUBS.filter(function(s){return s.status!=='approved';});
  var approved=SUBS.filter(function(s){return s.status==='approved';});

  function subCard(s,i){
    var isPending=s.status!=='approved';
    return '<div class="sub-card '+(isPending?'pending':'approved')+'">'
      +'<div class="sub-head">'
      +'<div><div class="sub-title">'+s.project_title+'</div>'
      +'<div class="sub-pi">'+s.pi_name+' &nbsp;&middot;&nbsp; '+s.lab+'</div></div>'
      +'<span class="sub-badge '+(isPending?'pending':'approved')+'">'+(isPending?'Pending':'Approved')+'</span>'
      +'</div>'
      +'<div class="sub-detail">'
      +'<strong>Crop:</strong> '+s.crop+' &nbsp;&middot;&nbsp; '
      +'<strong>Season:</strong> '+s.year+' &nbsp;&middot;&nbsp; '
      +'<strong>Acreage:</strong> '+(s.acreage_needed||'TBD')+' ac<br>'
      +(s.project_length?'<strong>Project length:</strong> '+s.project_length+'<br>':'')
      +(s.restrictions?'<strong>Restrictions:</strong> '+s.restrictions+'<br>':'')
      +(s.notes?'<strong>Notes:</strong> '+s.notes:'')
      +'</div>'
      +(isPending?'<div class="sub-assign">'
        +'<input type="text" id="assign-'+i+'" placeholder="Assign field ID (e.g. N9)" style="max-width:160px">'
        +'<button class="btn-p" onclick="approveSubmission('+i+')">Approve &amp; Add Field</button>'
        +'<button class="btn-s" onclick="rejectSubmission('+i+')">Reject</button>'
        +'</div>':'')
      +'</div>';
  }

  root.innerHTML='<div style="background:var(--dd-blue);padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between">'
    +'<div style="display:flex;align-items:center;gap:10px">'
    +'<button onclick="go('field',null)" style="background:rgba(255,255,255,.15);border:none;color:#fff;padding:5px 10px;border-radius:20px;cursor:pointer;font-size:13px"><i class="ti ti-arrow-left"></i></button>'
    +'<span style="color:#fff;font-size:14px;font-weight:600">Review Queue ('+pending.length+' pending)</span>'
    +'</div></div>'
    +'<div style="padding:.875rem 1rem">'
    +(pending.length===0?'<p style="font-size:13px;color:var(--text-muted);margin-bottom:1rem">No pending submissions.</p>':pending.map(subCard).join(''))
    +(approved.length?'<p class="sh" style="margin-top:1rem">Recently approved</p>'+approved.slice(0,3).map(function(s,i){return subCard(s,pending.length+i);}).join(''):'')
    +'<div style="margin-top:1rem;padding:.875rem;background:var(--dd-blue-light);border:1px solid #B5D4F4;border-radius:var(--r);font-size:12px;color:var(--dd-blue)">'
    +'<strong>How to receive submissions:</strong> Share your Google Form link with PIs. Responses appear in the <code>Submissions</code> tab of your Google Sheet and show up here after a page refresh.'
    +'</div></div>';
}

function approveSubmission(idx){
  var s=SUBS[idx];
  var fid=document.getElementById('assign-'+idx).value.trim().toUpperCase();
  if(!fid){alert('Please enter a field ID first.');return;}
  if(!confirm('Approve "'+s.project_title+'" and assign to field '+fid+'?\n\nThis will add the field to your Fields tab in Google Sheets. You will need to manually add the row to your Sheet.'))return;

  // Build the fields row for the user to copy
  var row=[
    fid, s.section||'', s.acreage_needed||'', '', '', 'FALSE',
    s.year||'2026', s.lab||'', s.pi_name||'', s.crop||'',
    s.project_code||'', s.project_length||'', s.planting_date||'', s.tillage||'FALSE',
    s.plot_length||'', s.planted_length||'', s.alley||'', s.columns||'', s.ranges||'',
    s.row_width||'', s.seeds_per_row||'',
    s.total_n||'', s.n_applications||'', s.n_gal_per_app||'', s.n_gal_total||'',
    s.imaging||'N', s.giddings||'N', s.mini_rhizo||'N',
    s.restrictions||'', s.notes||''
  ].join('	');

  alert('Add this row to your Fields tab in Google Sheets (Ctrl+C to copy):

'+row);
  SUBS[idx].status='approved';
  renderReview(document.getElementById('root'));
}

function rejectSubmission(idx){
  if(!confirm('Reject this submission?'))return;
  SUBS.splice(idx,1);
  renderReview(document.getElementById('root'));
}


function renderRollover(root){
  if(!adminMode){root.innerHTML='<div class="error-box">Admin access required.</div>';return;}
  var fields=Object.values(FIELDS).sort(function(a,b){return a.field_id.localeCompare(b.field_id);});
  var newYear=parseInt(fields[0]&&fields[0].year||2026)+1;

  var rows=fields.map(function(f){
    var isP=f.perennial==='TRUE';
    return '<div class="rollover-row">'
      +'<span class="rollover-fid">'+f.field_id+'</span>'
      +'<span class="rollover-crop">'+f.crop.split(',')[0]+' &nbsp;&middot;&nbsp; '+f.lab+'</span>'
      +'<span class="rollover-badge '+(isP?'keep':'reset')+'">'+(isP?'Keep (perennial)':'Archive + reset')+'</span>'
      +'</div>';
  }).join('');

  root.innerHTML='<div style="background:var(--dd-blue);padding:.75rem 1rem;display:flex;align-items:center;gap:10px">'
    +'<button onclick="go('field',null)" style="background:rgba(255,255,255,.15);border:none;color:#fff;padding:5px 10px;border-radius:20px;cursor:pointer;font-size:13px"><i class="ti ti-arrow-left"></i></button>'
    +'<span style="color:#fff;font-size:14px;font-weight:600">Season Rollover to '+newYear+'</span>'
    +'</div>'
    +'<div style="padding:.875rem 1rem">'
    +'<p style="font-size:13px;color:var(--text-muted);margin-bottom:1rem;line-height:1.5">This will archive all annual fields from <strong>'+fields[0].year+'</strong> to your History tab and clear task checklists. Perennial fields will be kept as-is. You will need to update crop/PI assignments in your Google Sheet for the new season.</p>'
    +'<div class="rollover-preview"><div class="rollover-head">Preview -- '+fields.length+' fields</div>'+rows+'</div>'
    +'<div class="reset-box" style="margin-top:1rem">'
    +'<div class="reset-ttl"><i class="ti ti-refresh" style="font-size:13px"></i> Confirm rollover to '+newYear+'</div>'
    +'<div class="reset-desc">This resets all task checklists and custom tasks. It does NOT update your Google Sheet automatically -- you will get a History tab paste to copy in.</div>'
    +'<button class="btn-danger" onclick="executeRollover('+newYear+')">Roll over all fields to '+newYear+'</button>'
    +'</div></div>';
}

function executeRollover(newYear){
  if(!confirm('Roll over ALL annual fields to '+newYear+'?\n\nTask checklists will be cleared. You will need to update the Google Sheet separately.'))return;

  // Build history rows to paste into Sheet
  var historyRows=['field_id	year	lab	crop'];
  Object.values(FIELDS).forEach(function(f){
    if(f.perennial!=='TRUE'){
      historyRows.push(f.field_id+'	'+f.year+'	'+f.lab+'	'+f.crop);
      taskState[f.field_id]={};
      customTasks[f.field_id]=[];
    }
  });

  var paste=historyRows.join('
');
  alert('Rollover complete!

Copy these rows into your History tab in Google Sheets:

'+paste+'

Then update the "year" column in your Fields tab to '+newYear+' and assign new crops/PIs.');
  go('field',null);
}


function renderIndex(root){
  const cards=Object.values(FIELDS).sort((a,b)=>a.field_id.localeCompare(b.field_id)).map(f=>{
    const per=f.perennial==='TRUE';
    return`<div class="idx-card" onclick="go('field','${f.field_id}')">
      <div class="idx-l"><div class="idx-icon ${per?'per':'ann'}" style="background:var(--${per?'purple':'green'}-light);color:var(--${per?'purple':'green'});border-color:${per?'#AFA9EC':'var(--green-border)'}">${f.field_id}</div>
      <div><div class="idx-ttl">${f.section} -- ${f.field_id}</div><div class="idx-sub">${f.pi} . ${f.crop.split(',')[0]} . ${f.acreage} ac</div></div></div>
      <i class="ti ti-chevron-right" style="color:var(--text-faint);font-size:16px;flex-shrink:0"></i></div>`;
  }).join('');
  root.innerHTML=`
    <div style="background:var(--dd-blue);padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="go('field',null)" style="background:rgba(255,255,255,.15);border:none;color:#fff;padding:5px 10px;border-radius:20px;cursor:pointer;font-size:13px"><i class="ti ti-arrow-left"></i></button>
        <span style="color:#fff;font-size:14px;font-weight:600">All Fields (${Object.keys(FIELDS).length})</span>
      </div>
      <a href="?view=qr" onclick="event.preventDefault();go('qr')" style="color:rgba(255,255,255,.8);font-size:12px;text-decoration:none"><i class="ti ti-qrcode"></i> QR codes</a>
    </div>
    <div style="padding:.875rem 1rem">${cards}</div>`;
}

function renderQR(root){
  root.innerHTML=`
    <div style="background:var(--dd-blue);padding:.75rem 1rem;display:flex;align-items:center;gap:10px">
      <button onclick="go('field',null)" style="background:rgba(255,255,255,.15);border:none;color:#fff;padding:5px 10px;border-radius:20px;cursor:pointer;font-size:13px"><i class="ti ti-arrow-left"></i></button>
      <span style="color:#fff;font-size:14px;font-weight:600">QR Codes</span>
    </div>
    <div class="qr-page">
      <button class="print-btn" onclick="setTimeout(function(){window.print();},500)"><i class="ti ti-printer"></i> Print QR Codes</button>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:1rem">Each code links to that field. Print, laminate, and mount on field signs.</p>
      <div id="qrStatus" style="font-size:13px;color:var(--text-muted);padding:.5rem 0">Generating QR codes...</div><div class="qr-grid" id="qrGrid"></div>
    </div>`;
  function generateQRs(){
    var g=document.getElementById('qrGrid');
    var status=document.getElementById('qrStatus');
    if(!g)return;
    var fields=Object.values(FIELDS).sort(function(a,b){return a.field_id.localeCompare(b.field_id);});
    if(fields.length===0){
      if(status)status.textContent='No fields found. Check your Google Sheet.';
      return;
    }
    g.innerHTML='';
    fields.forEach(function(f){
      var url=SITE_URL+'?field='+f.field_id;
      var encoded=encodeURIComponent(url);
      var qrSrc='https://api.qrserver.com/v1/create-qr-code/?size=150x150&data='+encoded+'&margin=4&color=000000&bgcolor=ffffff';
      var card=document.createElement('div');
      card.className='qr-card';
      card.innerHTML='<img src="'+qrSrc+'" width="150" height="150" style="display:block;margin:0 auto 8px" alt="QR '+f.field_id+'">'
        +'<div class="qr-lbl">'+f.field_id+'</div>'
        +'<div class="qr-sub">'+f.section+' - '+f.crop.split(',')[0]+'</div>'
        +'<div class="qr-url">'+url+'</div>';
      g.appendChild(card);
    });
    if(status)status.style.display='none';
  }
  setTimeout(generateQRs,100);
}

function openLogin(){document.getElementById('loginModal').classList.add('on');setTimeout(()=>document.getElementById('loginPw').focus(),100);}
function closeLogin(){document.getElementById('loginModal').classList.remove('on');document.getElementById('loginPw').value='';document.getElementById('loginErr').style.display='none';}
function tryLogin(){
  if(document.getElementById('loginPw').value===ADMIN_PW){
    adminMode=true;closeLogin();
    document.getElementById('adminBanner').classList.add('on');
    document.getElementById('adminBtn').classList.add('on');
    document.getElementById('adminBtn').innerHTML='<i class="ti ti-shield-check"></i> Admin';
    var al=document.getElementById('adminLinks');if(al)al.style.display='inline';
    render();
  }else{document.getElementById('loginErr').style.display='block';document.getElementById('loginPw').value='';}
}
function lockAdmin(){
  adminMode=false;
  document.getElementById('adminBanner').classList.remove('on');
  document.getElementById('adminBtn').classList.remove('on');
  document.getElementById('adminBtn').innerHTML='<i class="ti ti-lock"></i> Admin';
  var al=document.getElementById('adminLinks');if(al)al.style.display='none';
  render();
}

loadData();
</script>
